# Render.com - AI Smart Schedule Dashboard
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-smart-schedule-dashboard
    runtime: node
    rootDir: dashboard
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Free tier has no persistent disk; uploads use ephemeral /tmp (lost on redeploy).
      - key: DATA_STORAGE_ROOT
        value: /tmp/uploads
      - key: GEMINI_API_KEY
        sync: false
      - key: DASHBOARD_PIN
        sync: false
