# Render.com - AI Smart Schedule Dashboard
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-smart-schedule-dashboard
    runtime: node
    rootDir: dashboard
    buildCommand: npm install
    startCommand: npm start
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: schedule-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      # Persistent disk: users/notifications/contacts survive redeploy.
      # Photos/videos stay until PC pull-agent downloads + deletes them.
      - key: DATA_DIR
        value: /var/data/app-data
      - key: DATA_STORAGE_ROOT
        value: /var/data/uploads
      - key: GEMINI_API_KEY
        sync: false
      - key: DASHBOARD_PIN
        sync: false
